<!DOCTYPE html>
<html>
<head>
  <title>Get Coins</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h2>Get Coins</h2>

  <div class="balance">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" width="30">
    <span id="balance">5000</span>
  </div>

  <h3>Recharge</h3>

  <div class="grid">
    <div class="coin" onclick="select(this,30)">30<br>$0.31</div>
    <div class="coin" onclick="select(this,350)">350<br>$3.65</div>
    <div class="coin" onclick="select(this,700)">700<br>$7.25</div>
    <div class="coin" onclick="select(this,1400)">1400<br>$14.49</div>
    <div class="coin active" onclick="select(this,3500)">3500<br>$36.2</div>
    <div class="coin">Custom</div>
  </div>

  <button class="buy">Buy Now</button>

  <button onclick="location.href='send.html'" class="sendBtn">
    Send Coins
  </button>

</div>

<script src="app.js"></script>
</body>
</html>
